n_layers: 2
n_heads: 4
hidden_size: 300
inner_size: 600
hidden_dropout_prob: 0.4
attn_dropout_prob: 0.4
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: CE
means_k: 50
knn_k: 10
bal: 5
miu_c: 0.3
miu_m: 2.5
mb: 0.1
fusion_temperature: 0.2
fusion_scale: 1.6
fusion_prior: [0.375, 0.5625, 0.0625]
fusion_dynamic_ratio: 0.1
w_balw: 0.001

use_diffusion_denoiser: False
baseline_checkpoint_path: ''
baseline_pretrain_epochs: 5
diffusion_warmup_epochs: 5
diffusion_lr: 0.001
diffusion_batch_size: 1024
diffusion_steps: 4
beta_graph: 0.001
denoiser_blend_alpha: 0.1
condition_type: id_graph

item_drop_ratio: 0.1
item_drop_coefficient: 0.9
lambda: 1e-3
gamma: 1e-4

text_suffix: text
image_suffix: image

# amazom
text_size: 768
image_size: 768 

temperature: 0.07
